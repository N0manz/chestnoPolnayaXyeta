<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
  <form th:action="@{/register}" method="post" th:object="${user}">
    <input type="text" th:field="*{username}" placeholder="Username"/>
    <input type="password" th:field="*{password}" placeholder="Password"/>
    <button type="submit">Register</button>
  </form>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Z Bets</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h2>Z Bets</h2>
      <p>Добро пожаловать, <strong th:text="${username}"></strong></p>
    </div>

    <div class="header-actions">
      <span class="balance">
        Баланс: <span th:text="${balance}"></span>
      </span>

      <a th:href="@{/my-bets}" class="nav-link">Мои ставки</a>

      <form th:action="@{/logout}" method="post">
        <button type="submit">Выйти</button>
      </form>
    </div>
  </div>

  <div th:if="${success}" class="message-success"
       th:text="${success}"></div>

  <div th:if="${error}" class="message-error"
       th:text="${error}"></div>

  <h3 class="section-title">Активные события</h3>

  <div class="events-grid">

    <div class="event-card" th:each="event : ${events}">

      <div class="event-header">
        <div class="match-name"
             th:text="${event.team1 + ' — ' + event.team2}">
        </div>

        <div class="start-time"
             th:text="${event.startTime}">
        </div>
      </div>

      <div class="coef-row">
        <div class="coef-box">
        <span class="coef-label"
              th:text="${event.team1}"></span>
          <span class="coef-value"
                th:text="${event.coefFirst}"></span>
        </div>

        <div class="coef-box">
        <span class="coef-label"
              th:text="${event.team2}"></span>
          <span class="coef-value"
                th:text="${event.coefSecond}"></span>
        </div>
      </div>

      <form th:action="@{/bet}" method="post" class="bet-form-card">
        <input type="hidden" name="eventId"
               th:value="${event.id}" />

        <select name="choice">
          <option value="FIRST"
                  th:text="${event.team1}"></option>
          <option value="SECOND"
                  th:text="${event.team2}"></option>
        </select>

        <input type="number"
               step="0.01"
               name="amount"
               placeholder="Amount"
               required/>

        <button type="submit">Place Bet</button>
      </form>

    </div>

  </div>

</div>
</body>
</html>

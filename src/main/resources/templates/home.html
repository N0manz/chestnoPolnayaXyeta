<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Z Bets</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h2>Z Bets</h2>
      <p>Welcome, <strong th:text="${username}"></strong></p>
    </div>

    <div>
            <span class="balance">
                Balance: <span th:text="${balance}"></span>
            </span>

      <a th:href="@{/my-bets}" style="margin-left:20px;">My Bets</a>

      <form th:action="@{/logout}" method="post" style="display:inline;">
        <button type="submit">Logout</button>
      </form>
    </div>
  </div>

  <div th:if="${success}" class="message-success"
       th:text="${success}"></div>

  <div th:if="${error}" class="message-error"
       th:text="${error}"></div>

  <h3>ACTIVE EVENTS</h3>

  <table>
    <tr>
      <th>Match</th>
      <th>Coef 1</th>
      <th>Coef 2</th>
      <th>Start</th>
      <th>Bet</th>
    </tr>

    <tr th:each="event : ${events}">
      <td th:text="${event.team1 + ' — ' + event.team2}"></td>
      <td th:text="${event.coefFirst}"></td>
      <td th:text="${event.coefSecond}"></td>
      <td th:text="${event.startTime}"></td>
      <td>
        <form th:action="@{/bet}" method="post">
          <input type="hidden" name="eventId"
                 th:value="${event.id}" />

          <select name="choice">
            <option value="FIRST"
                    th:text="${event.team1}"></option>
            <option value="SECOND"
                    th:text="${event.team2}"></option>
          </select>

          <input type="number"
                 step="0.01"
                 name="amount"
                 placeholder="Amount"
                 required/>

          <button type="submit">Place</button>
        </form>
      </td>
    </tr>
  </table>

</div>
</body>
</html>

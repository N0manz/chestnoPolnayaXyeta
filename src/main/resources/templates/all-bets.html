<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Все ставки</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <div class="header">
        <div>
            <h2>Все ставки пользователей</h2>
        </div>

        <div>
            <a th:href="@{/}" class="nav-link">На главную</a>
        </div>
    </div>

    <div class="bets-grid">

        <div class="bet-card" th:each="bet : ${bets}">

            <div class="bet-top">
                <div class="bet-user"
                     th:text="${bet.user.username}">
                </div>

                <div class="bet-status"
                     th:text="${bet.status}"
                     th:class="'bet-status status-' + ${bet.status}">
                </div>
            </div>

            <div class="bet-match"
                 th:text="${bet.event.team1 + ' — ' + bet.event.team2}">
            </div>

            <div class="bet-details">

                <div class="bet-detail">
                    <span>Выбор</span>
                    <strong th:text="${bet.choice}"></strong>
                </div>

                <div class="bet-detail">
                    <span>Сумма</span>
                    <strong th:text="${bet.amount}"></strong>
                </div>

                <div class="bet-detail">
                    <span>Коэф</span>
                    <strong th:text="${bet.coefAtMoment}"></strong>
                </div>

                <div class="bet-detail">
                    <span>Дата</span>
                    <strong th:text="${bet.createdAt}"></strong>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>
<div class="container">

    <h2>LOGIN</h2>

    <form th:action="@{/login}" method="post">

    <p style="margin-top:20px;">

    </p>

    <p>

    </p>

</div>
</body>
</html>

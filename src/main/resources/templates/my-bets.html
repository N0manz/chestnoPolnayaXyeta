<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Мои ставки</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">

    <div class="header">
        <div>
            <h2>Мои ставки</h2>
            <p>История ваших ставок</p>
        </div>

        <div>
            <a th:href="@{/}">На главную</a>
        </div>
    </div>

    <table>
        <tr>
            <th>ID</th>
            <th>Матч</th>
            <th>Выбор</th>
            <th>Сумма</th>
            <th>Коэф</th>
            <th>Потенциальный выигрыш</th>
            <th>Статус</th>
            <th>Дата</th>
        </tr>

        <tr th:each="bet : ${bets}">
            <td th:text="${bet.id}"></td>

            <td th:text="${bet.event.team1 + ' — ' + bet.event.team2}"></td>

            <td th:text="${bet.choice}"></td>

            <td th:text="${bet.amount}"></td>

            <td th:text="${bet.coefAtMoment}"></td>

            <td th:text="${bet.amount.multiply(bet.coefAtMoment)}"></td>

            <td th:text="${bet.status}"
                th:class="'status-' + ${bet.status}">
            </td>

            <td th:text="${bet.createdAt}"></td>
        </tr>
    </table>

</div>

</body>
</html>
